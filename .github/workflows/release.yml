name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn release
